version: 1
frontend:
  phases:
    build:
      commands:
        - 'echo "Static site: no build step required."'
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - robots.txt
      - sitemap.xml
      - site.webmanifest
      - assets/**/*
      - contact/**/*
      - favicon/**/*
      - publications/**/*
      - research/**/*
      - tutorial/**/*
  cache:
    paths: []
