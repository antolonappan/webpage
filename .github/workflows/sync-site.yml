name: Sync Research Site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 1 * *"
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "scripts/**"
      - "build.js"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write

concurrency:
  group: sync-research-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y webp

      - name: Install dependencies
        run: npm ci

      - name: Sync arXiv metadata and figures
        run: npm run sync:research

      - name: Sync Google Scholar metrics
        env:
          ALLOW_SCHOLAR_FAILURE: "1"
        run: npm run sync:scholar

      - name: Build site
        run: npm run build

      - name: Validate generated site
        run: npm run validate

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update generated research site"
          git push
